[env:esp32-p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-p4
framework = arduino

; === FLASH & STORAGE ===
board_upload.flash_size = 16MB
board_build.partitions = partitions_ota_spiffs7m.csv
board_build.filesystem = spiffs
board_build.flash_mode = qio
board_build.f_flash = 80000000L         ; 80MHz flash speed (max for QIO)

; === PSRAM (32MB OPI) ===
board_build.psram_type = opi
board_build.f_psram = 200000000L        ; 200MHz PSRAM speed (OPI max)

; === CPU FREQUENCY ===
board_build.f_cpu = 400000000L          ; 400MHz dual-core RISC-V (official max per datasheet)

lib_ldf_mode = deep
lib_archive = false

extra_scripts = pre:remove_lvgl_asm.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=0
    -DLV_CONF_INCLUDE_SIMPLE
    -I.
    ; Optimization flags for RISC-V dual-core
    -O3
    -ffunction-sections
    -fdata-sections
    ; PSRAM XIP (Execute In Place) - allows code execution from PSRAM
    ; Reduces flash pressure, may slightly reduce performance but increases code space
    ; Uncomment to test: -DCONFIG_SPIRAM_XIP_FROM_PSRAM=1
    ; LVGL ASM disabled (RISC-V, not ARM)
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -DLV_USE_DRAW_SW_ASM_HELIUM=0
    -DLV_USE_DRAW_SW_ASM_NEON=0
    -Wno-deprecated-declarations
    -Wno-attributes
    ; ESP-IDF component access for PPA driver
    -Wl,-Map,firmware.map
    ; Reduce mbedTLS buffer sizes to save DMA memory for OTA (prevents SDIO crashes)
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=4096
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=4096

build_unflags =

build_src_filter =
    +<*>
    +<screens/*>
    +<fonts/*.c>
    -<fonts/noto_sans_cjk_jp_data.cpp>
    -<fonts/noto_sans_cjk_kr_data.cpp>
    -<.git/>
    -<.svn/>

upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

lib_deps =
    lvgl/lvgl@^9.5.0
    tamctec/TAMC_GT911@^1.0.2
    bblanchon/ArduinoJson@^7.4.3
    bitbank2/PNGdec@^1.1.6
    bitbank2/JPEGDEC@^1.8.4
